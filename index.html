
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0f11;--surface:#16181c;--surface2:#1e2126;--surface3:#252930;
    --border:#2e3340;--border2:#3a4050;
    --text:#f0f2f7;--text2:#9ba3b4;--text3:#5a6278;
    --accent:#7c6af4;--accent2:#a394ff;
    --green:#3ecf8e;--red:#f46a6a;--amber:#f9b44a;--blue:#5aabff;
    --teal:#36c6c6;
    --font-display:'DM Serif Display',serif;
    --font:'DM Sans',sans-serif;
    --r:12px;--r2:8px;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
  .app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
  .logo{font-family:var(--font-display);font-size:22px;color:var(--text);letter-spacing:-0.5px}
  .logo span{color:var(--accent2)}
  .header-actions{display:flex;gap:10px;align-items:center}
  .btn{border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;border-radius:var(--r2);padding:8px 16px;transition:all 0.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{background:var(--surface3);color:var(--text)}
  .btn-danger{background:transparent;color:var(--red);border:1px solid var(--border)}
  .btn-danger:hover{background:rgba(244,106,106,0.1)}
  main{padding:24px 28px;max-width:1100px;margin:0 auto;width:100%}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
  .stat-card::after{content:'';position:absolute;inset:0;opacity:0.04;border-radius:var(--r)}
  .stat-card.green::after{background:var(--green)}
  .stat-card.red::after{background:var(--red)}
  .stat-card.amber::after{background:var(--amber)}
  .stat-card.blue::after{background:var(--blue)}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
  .stat-value{font-size:26px;font-weight:600;letter-spacing:-0.5px}
  .stat-value.green{color:var(--green)}
  .stat-value.red{color:var(--red)}
  .stat-value.amber{color:var(--amber)}
  .stat-value.blue{color:var(--blue)}
  .stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
  .content-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px}
  .card-title{font-size:15px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--text)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .form-group label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
  .form-group input,.form-group select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;color:var(--text);font-family:var(--font);font-size:14px;transition:border 0.15s;width:100%}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
  .form-group select option{background:var(--surface2)}
  .cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .cat-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all 0.15s}

  /* Type toggle buttons */
  .type-btn{padding:7px 20px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.2s;font-family:var(--font)}
  .type-btn.active-expense{background:rgba(244,106,106,0.15);border-color:#f46a6a;color:#f46a6a}
  .type-btn.active-income{background:rgba(62,207,142,0.15);border-color:#3ecf8e;color:#3ecf8e}

  .expense-list{display:flex;flex-direction:column;gap:8px;max-height:480px;overflow-y:auto;padding-right:4px}
  .expense-list::-webkit-scrollbar{width:3px}
  .expense-list::-webkit-scrollbar-track{background:transparent}
  .expense-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .expense-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:border 0.15s;position:relative}
  .expense-item:hover{border-color:var(--border2)}
  .expense-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .expense-info{flex:1;min-width:0}
  .expense-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .expense-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center}
  .expense-amount{font-size:16px;font-weight:600;color:var(--red)}
  .expense-amount.income{color:var(--green)}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;transition:all 0.15s;opacity:0;font-size:16px;line-height:1}
  .expense-item:hover .del-btn{opacity:1}
  .del-btn:hover{background:rgba(244,106,106,0.15);color:var(--red)}
  .sidebar{display:flex;flex-direction:column;gap:14px}
  .bar-chart{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .bar-row{display:grid;grid-template-columns:100px 1fr 52px;gap:10px;align-items:center}
  .bar-label{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
  .bar-val{font-size:12px;color:var(--text2);text-align:right;font-weight:500}
  .budget-section{margin-top:4px}
  .budget-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .budget-label{font-size:13px;color:var(--text2)}
  .budget-val{font-size:13px;font-weight:600}
  .big-bar-track{height:10px;background:var(--surface3);border-radius:6px;overflow:hidden;margin-bottom:6px}
  .big-bar-fill{height:100%;border-radius:6px;transition:width 0.5s;background:var(--green)}
  .big-bar-fill.warn{background:var(--amber)}
  .big-bar-fill.danger{background:var(--red)}
  .budget-input-row{display:flex;gap:8px;align-items:center;margin-top:10px}
  .budget-input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px}
  .budget-input-row input:focus{outline:none;border-color:var(--accent)}
  .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.15s}
  .filter-chip.active,.filter-chip:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
  .search-input{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text);font-family:var(--font);font-size:13px}
  .search-input:focus{outline:none;border-color:var(--accent)}
  .empty{text-align:center;padding:40px;color:var(--text3)}
  .empty-icon{font-size:36px;margin-bottom:10px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);border:1px solid var(--border2);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:all 0.25s;z-index:9999;pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:900px){.content-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){main{padding:16px}header{padding:0 16px}.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Expense<span>Tracker</span></div>
    <div class="header-actions">
      <span id="month-label" style="font-size:13px;color:var(--text3)"></span>
      <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
    </div>
  </header>
  <main>
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">Total Income</div>
        <div class="stat-value green" id="total-income">₹0</div>
        <div class="stat-sub" id="income-count">0 transactions</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value red" id="total-expenses">₹0</div>
        <div class="stat-sub" id="expense-count">0 transactions</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Net Balance</div>
        <div class="stat-value amber" id="net-balance">₹0</div>
        <div class="stat-sub">this month</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Biggest Expense</div>
        <div class="stat-value blue" id="biggest-expense">₹0</div>
        <div class="stat-sub" id="biggest-cat">—</div>
      </div>
    </div>

    <div class="content-grid">
      <div>
        <div class="card" style="margin-bottom:18px">
          <div class="card-title">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Add transaction
          </div>
          <div style="display:flex;gap:8px;margin-bottom:16px">
            <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
            <button class="type-btn" id="btn-income" onclick="setType('income')">Income</button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="inp-name" placeholder="e.g. Lunch at Saravana Bhavan" maxlength="60"/>
            </div>
            <div class="form-group">
              <label>Amount (₹)</label>
              <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="inp-date"/>
            </div>
            <div class="form-group">
              <label>Payment</label>
              <select id="inp-payment">
                <option>UPI</option>
                <option>Cash</option>
                <option>Card</option>
                <option>Net Banking</option>
                <option>Wallet</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Category</label>
            <div class="cat-chips" id="cat-chips"></div>
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="addTransaction()">Add transaction</button>
        </div>

        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div class="card-title" style="margin-bottom:0">Transactions</div>
            <button class="btn btn-danger" onclick="clearAll()" style="font-size:12px;padding:6px 12px">Clear all</button>
          </div>
          <div class="filter-bar">
            <input class="search-input" id="search" placeholder="Search..." oninput="render()"/>
            <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
            <button class="filter-chip" onclick="setFilter('expense',this)">Expenses</button>
            <button class="filter-chip" onclick="setFilter('income',this)">Income</button>
          </div>
          <div class="expense-list" id="expense-list"></div>
        </div>
      </div>

      <div class="sidebar">
        <div class="card">
          <div class="card-title">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            Monthly budget
          </div>
          <div class="budget-section">
            <div class="budget-row">
              <span class="budget-label">Spent</span>
              <span class="budget-val" id="budget-spent" style="color:var(--red)">₹0</span>
            </div>
            <div class="budget-row">
              <span class="budget-label">Budget</span>
              <span class="budget-val" id="budget-set">₹0</span>
            </div>
            <div class="big-bar-track">
              <div class="big-bar-fill" id="budget-bar" style="width:0%"></div>
            </div>
            <div style="font-size:12px;color:var(--text3)" id="budget-pct">Set a budget below</div>
            <div class="budget-input-row">
              <input type="number" id="budget-input" placeholder="Set monthly budget (₹)" min="0" step="100"/>
              <button class="btn btn-primary" onclick="setBudget()" style="padding:8px 12px;font-size:12px">Set</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 21H3V3"/><path d="M7 10l4 4 4-4 4 4"/></svg>
            Spending by category
          </div>
          <div class="bar-chart" id="cat-chart"></div>
        </div>

        <div class="card">
          <div class="card-title">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Day streak
          </div>
          <div id="streak-info" style="font-size:13px;color:var(--text2);line-height:1.7"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast"></div>

<script>
const CATEGORIES = {
  Food:{emoji:'🍽',color:'#f46a6a'},
  Transport:{emoji:'🚌',color:'#5aabff'},
  Shopping:{emoji:'🛍',color:'#a394ff'},
  Health:{emoji:'💊',color:'#3ecf8e'},
  Entertainment:{emoji:'🎬',color:'#f9b44a'},
  Bills:{emoji:'📄',color:'#36c6c6'},
  Education:{emoji:'📚',color:'#ff8fa3'},
  'Home & Rent':{emoji:'🏠',color:'#72e4b8'},
  Salary:{emoji:'💼',color:'#3ecf8e'},
  Freelance:{emoji:'💻',color:'#a394ff'},
  Investment:{emoji:'📈',color:'#5aabff'},
  Other:{emoji:'✦',color:'#9ba3b4'},
};

let transactions = JSON.parse(localStorage.getItem('sw_txns')||'[]');
let budget = parseFloat(localStorage.getItem('sw_budget')||'0');
let activeType = 'expense';
let activeCat = 'Food';
let filter = 'all';

function save(){localStorage.setItem('sw_txns',JSON.stringify(transactions));localStorage.setItem('sw_budget',budget)}
function fmt(n){return '₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0})}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function setType(type){
  activeType = type;
  const btnE = document.getElementById('btn-expense');
  const btnI = document.getElementById('btn-income');
  // Reset both buttons first
  btnE.className = 'type-btn';
  btnI.className = 'type-btn';
  // Apply active style to the selected one
  if(type === 'expense') btnE.className = 'type-btn active-expense';
  else btnI.className = 'type-btn active-income';
  buildCatChips();
}

function buildCatChips(){
  const cats = activeType==='income'
    ? ['Salary','Freelance','Investment','Other']
    : Object.keys(CATEGORIES).filter(c=>!['Salary','Freelance','Investment'].includes(c));
  if(!cats.includes(activeCat)) activeCat = cats[0];
  const container = document.getElementById('cat-chips');
  container.innerHTML = cats.map(c=>`<button class="cat-chip" onclick="selectCat('${c}')"
    style="${activeCat===c ? `background:${CATEGORIES[c].color}22;border-color:${CATEGORIES[c].color};color:${CATEGORIES[c].color}` : ''}"
    >${CATEGORIES[c].emoji} ${c}</button>`).join('');
}

function selectCat(c){activeCat=c;buildCatChips()}

function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.filter-chip').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addTransaction(){
  const name=document.getElementById('inp-name').value.trim();
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const date=document.getElementById('inp-date').value;
  const payment=document.getElementById('inp-payment').value;
  if(!name){toast('Enter a description');return}
  if(!amount||amount<=0){toast('Enter a valid amount');return}
  if(!date){toast('Select a date');return}
  transactions.unshift({id:Date.now(),name,amount,date,payment,category:activeCat,type:activeType});
  save();
  document.getElementById('inp-name').value='';
  document.getElementById('inp-amount').value='';
  toast('Transaction added!');
  render();renderStats();renderCatChart();renderBudget();
}

function deleteTransaction(id){
  transactions=transactions.filter(t=>t.id!==id);
  save();render();renderStats();renderCatChart();renderBudget();
  toast('Deleted');
}

function clearAll(){if(!confirm('Clear all transactions?'))return;transactions=[];save();render();renderStats();renderCatChart();renderBudget();toast('All cleared')}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=transactions.filter(t=>{
    if(filter==='expense'&&t.type!=='expense')return false;
    if(filter==='income'&&t.type!=='income')return false;
    if(q&&!t.name.toLowerCase().includes(q)&&!t.category.toLowerCase().includes(q))return false;
    return true;
  });
  const el=document.getElementById('expense-list');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">💸</div><div>No transactions yet</div></div>`;return}
  el.innerHTML=list.map(t=>{
    const cat=CATEGORIES[t.category]||CATEGORIES.Other;
    const d=new Date(t.date);
    const ds=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    return`<div class="expense-item">
      <div class="expense-icon" style="background:${cat.color}22">${cat.emoji}</div>
      <div class="expense-info">
        <div class="expense-name">${t.name}</div>
        <div class="expense-meta">
          <span>${ds}</span>
          <span style="color:${cat.color}">${t.category}</span>
          <span style="background:var(--surface3);padding:1px 6px;border-radius:4px">${t.payment}</span>
        </div>
      </div>
      <span class="expense-amount${t.type==='income'?' income':''}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span>
      <button class="del-btn" onclick="deleteTransaction(${t.id})">×</button>
    </div>`;
  }).join('');
}

function setBudget(){
  const v=parseFloat(document.getElementById('budget-input').value);
  if(!v||v<=0){toast('Enter a valid budget');return}
  budget=v;save();renderBudget();
  document.getElementById('budget-input').value='';
  toast('Budget set to '+fmt(v));
}

function renderStats(){
  const income=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expenses=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net=income-expenses;
  document.getElementById('total-income').textContent=fmt(income);
  document.getElementById('total-expenses').textContent=fmt(expenses);
  document.getElementById('income-count').textContent=transactions.filter(t=>t.type==='income').length+' transactions';
  document.getElementById('expense-count').textContent=transactions.filter(t=>t.type==='expense').length+' transactions';
  const nb=document.getElementById('net-balance');
  nb.textContent=fmt(net);
  nb.style.color=net>=0?'var(--green)':'var(--red)';
  const exp=transactions.filter(t=>t.type==='expense');
  if(exp.length){
    const biggest=exp.reduce((a,b)=>b.amount>a.amount?b:a);
    document.getElementById('biggest-expense').textContent=fmt(biggest.amount);
    document.getElementById('biggest-cat').textContent=biggest.category;
  }
  else{
    document.getElementById('biggest-expense').textContent=fmt(0);
    document.getElementById('biggest-cat').textContent='NA';
  }
  renderStreak();
}

function renderCatChart(){
  const totals={};
  transactions.filter(t=>t.type==='expense').forEach(t=>{totals[t.category]=(totals[t.category]||0)+t.amount});
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const max=sorted[0]?.[1]||1;
  const el=document.getElementById('cat-chart');
  if(!sorted.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">No expense data yet</div>';return}
  el.innerHTML=sorted.map(([cat,val])=>{
    const c=CATEGORIES[cat]||CATEGORIES.Other;
    const pct=Math.round(val/max*100);
    return`<div class="bar-row">
      <div class="bar-label">${c.emoji} ${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="bar-val">${fmt(val)}</div>
    </div>`;
  }).join('');
}

function renderBudget(){
  const spent=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('budget-spent').textContent=fmt(spent);
  document.getElementById('budget-set').textContent=budget?fmt(budget):'Not set';
  if(budget){
    const pct=Math.min(100,Math.round(spent/budget*100));
    const bar=document.getElementById('budget-bar');
    bar.style.width=pct+'%';
    bar.className='big-bar-fill'+(pct>=100?' danger':pct>=75?' warn':'');
    document.getElementById('budget-pct').textContent=pct+'% of budget used';
  }
}

function renderStreak(){
  const days=new Set(transactions.map(t=>t.date));
  document.getElementById('streak-info').innerHTML=`
    <div style="margin-bottom:6px"><span style="font-size:22px;font-weight:600;color:var(--amber)">${days.size}</span> <span style="color:var(--text3)">days tracked</span></div>
    <div style="color:var(--text3)">${transactions.length} total transactions</div>
  `;
}

function exportCSV(){
  if(!transactions.length){toast('No transactions to export');return}
  const header='Date,Description,Category,Type,Amount,Payment\n';
  const rows=transactions.map(t=>`${t.date},"${t.name}",${t.category},${t.type},${t.amount},${t.payment}`).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='spendwise-export.csv';a.click();
  toast('CSV exported!');
}

// Init
document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
document.getElementById('month-label').textContent=new Date().toLocaleString('en-IN',{month:'long',year:'numeric'});
buildCatChips();
render();renderStats();renderCatChart();renderBudget();
</script>
</body>
